<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Természetismeret 5. 🌱</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Nunito:wght@300;400;600;700;800&family=Oswald:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --leaf:#2d9e5f;--leaf-light:#4ade80;--leaf-dark:#166534;
  --soil:#8b5e3c;--soil-light:#d4a574;
  --sky:#0ea5e9;--sky-light:#bae6fd;
  --sun:#f59e0b;--sun-light:#fde68a;
  --moss:#6b8f3e;--moss-light:#a3c463;
  --bark:#5c3d2e;--bark-light:#9b6b4a;
  --water:#0891b2;--water-light:#67e8f9;
  --bg:#0a110a;--bg2:#0d1a0d;
  --card-bg:rgba(10,20,10,0.88);
  --text:#e8f5e9;--text-mid:#86a88a;
  --border:rgba(45,158,95,0.18);
  --glow:rgba(45,158,95,0.4);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;min-height:100vh;background:var(--bg);color:var(--text);overflow-x:hidden;}

/* ═══ ANIMATED FOREST BACKGROUND ═══ */
.forest-bg{position:fixed;inset:0;z-index:0;overflow:hidden;}
.forest-bg canvas{position:absolute;inset:0;width:100%;height:100%;}
.forest-overlay{position:absolute;inset:0;background:
  radial-gradient(ellipse 70% 50% at 50% 20%, rgba(45,158,95,0.07) 0%, transparent 70%),
  radial-gradient(ellipse 100% 40% at 50% 100%, rgba(11,40,15,0.9) 0%, transparent 60%);}

/* ═══ FLOATING PARTICLES ═══ */
.leaf-particle{position:fixed;pointer-events:none;font-size:1rem;animation:leafFloat linear infinite;opacity:0;z-index:1;}
@keyframes leafFloat{
  0%{transform:translateY(110vh) rotate(0deg) scale(0.5);opacity:0;}
  5%{opacity:0.6;}
  95%{opacity:0.2;}
  100%{transform:translateY(-10vh) rotate(720deg) scale(1.2);opacity:0;}
}

/* ═══ LAYOUT ═══ */
#app{position:relative;z-index:2;max-width:900px;margin:0 auto;padding:16px 14px 80px;}

/* ═══ HEADER ═══ */
header{text-align:center;padding:28px 10px 10px;}
header h1{
  font-family:'Playfair Display',serif;font-style:italic;font-size:2.6rem;font-weight:700;
  color:#fff;line-height:1.1;letter-spacing:-0.01em;
  text-shadow:0 0 60px rgba(45,158,95,0.6), 0 0 120px rgba(45,158,95,0.2);
}
header h1 em{color:#4ade80;font-style:normal;}
header p{margin-top:5px;font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:#2d5a35;font-weight:700;}

/* ═══ CARD ═══ */
@keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(0.97)}to{opacity:1;transform:none}}
.card{
  background:var(--card-bg);border-radius:22px;padding:26px 24px 22px;
  border:1px solid var(--border);
  box-shadow:0 0 0 1px rgba(45,158,95,0.08), 0 24px 70px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.04);
  animation:cardIn 0.38s cubic-bezier(.4,0,.2,1);backdrop-filter:blur(14px);
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;inset:0;border-radius:22px;
  background:linear-gradient(135deg,rgba(45,158,95,0.04) 0%,transparent 50%);pointer-events:none;
}

/* ═══ NAME SCREEN ═══ */
.name-screen{text-align:center;}
.name-screen h2{font-family:'Playfair Display',serif;font-style:italic;font-size:1.8rem;font-weight:400;color:#fff;margin-bottom:8px;}
.name-screen p{color:var(--text-mid);font-size:.9rem;margin-bottom:24px;}
.name-input{
  font-family:'Oswald',sans-serif;font-size:1.05rem;font-weight:500;
  padding:13px 18px;border-radius:12px;border:1px solid rgba(45,158,95,0.4);
  width:100%;max-width:320px;text-align:center;outline:none;
  color:#fff;background:rgba(45,158,95,0.08);
  margin-bottom:20px;display:block;margin-left:auto;margin-right:auto;
  transition:border-color .2s, box-shadow .2s;
}
.name-input:focus{border-color:rgba(45,158,95,0.8);box-shadow:0 0 0 3px rgba(45,158,95,0.2);}
.name-input::placeholder{color:#2d5a35;}

/* ═══ 3D ORBS LANDING ═══ */
.orbs-landing{display:flex;flex-direction:column;align-items:center;padding:8px 0 4px;min-height:560px;}
.orb-hint{font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:#2d5a35;font-weight:700;margin-bottom:18px;animation:hintFade 5s 1.5s both;}
@keyframes hintFade{0%{opacity:0}15%{opacity:1}75%{opacity:1}100%{opacity:0}}
.orbs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:28px 18px;width:100%;justify-items:center;}
@media(max-width:600px){.orbs-grid{grid-template-columns:repeat(2,1fr);gap:20px 12px;}}

/* ═══ SINGLE ORB ═══ */
.orb-wrapper{display:flex;flex-direction:column;align-items:center;gap:0;position:relative;padding-top:48px;padding-bottom:30px;}
.orb-label-top{
  position:absolute;top:0;left:50%;transform:translateX(-50%);width:160px;
  font-family:'Playfair Display',serif;font-style:italic;font-size:.82rem;
  color:#fff;text-align:center;line-height:1.3;pointer-events:none;z-index:10;
  text-shadow:0 0 12px rgba(255,255,255,0.2);
}
.orb-label-bot{
  position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  white-space:nowrap;font-family:'Oswald',sans-serif;font-size:.68rem;
  letter-spacing:.1em;font-weight:500;opacity:.5;text-align:center;pointer-events:none;z-index:10;
}
.orb-scene{width:140px;height:140px;perspective:500px;perspective-origin:50% 40%;cursor:pointer;}
.orb3d{
  width:140px;height:140px;position:relative;
  transform-style:preserve-3d;
  cursor:pointer;
  animation:orbIntro .9s cubic-bezier(.22,.82,.26,1) both;
}
@keyframes orbIntro{from{transform:scale3d(.2,.2,.2) rotateY(-180deg);opacity:0}to{transform:scale3d(1,1,1) rotateY(0deg);opacity:1}}

/* THE SPHERE — CSS 3D sphere from many faces */
.orb-sphere{
  width:140px;height:140px;border-radius:50%;position:relative;
  transform-style:preserve-3d;
  transition:filter .3s;
}
.orb-scene:hover .orb-sphere{filter:brightness(1.25);}

/* Equator ring */
.orb-ring{
  position:absolute;width:140px;height:140px;border-radius:50%;
  border:2px solid rgba(255,255,255,0.15);
  transform:rotateX(75deg);
  animation:ringRotate 8s linear infinite;
  pointer-events:none;
}
@keyframes ringRotate{from{transform:rotateX(75deg) rotateZ(0deg)}to{transform:rotateX(75deg) rotateZ(360deg)}}
.orb-ring2{
  position:absolute;width:140px;height:140px;border-radius:50%;
  border:1px solid rgba(255,255,255,0.08);
  transform:rotateY(75deg);
  animation:ringRotate2 12s linear infinite reverse;
  pointer-events:none;
}
@keyframes ringRotate2{from{transform:rotateY(75deg) rotateZ(0deg)}to{transform:rotateY(75deg) rotateZ(360deg)}}

/* Glow pulse */
.orb-glow{
  position:absolute;inset:-15px;border-radius:50%;
  animation:glowPulse 3s ease-in-out infinite;
  pointer-events:none;
}
@keyframes glowPulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}

/* Icon + text inside orb */
.orb-inner{
  position:absolute;inset:0;border-radius:50%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:2;gap:4px;
}
.orb-icon{font-size:2.8rem;line-height:1;filter:drop-shadow(0 0 14px currentColor);animation:iconPulse 3s ease-in-out infinite;}
@keyframes iconPulse{0%,100%{filter:drop-shadow(0 0 8px currentColor)}50%{filter:drop-shadow(0 0 22px currentColor)}}
.orb-num{font-family:'Oswald',sans-serif;font-size:.65rem;font-weight:600;opacity:.45;letter-spacing:.08em;}

/* Locked overlay */
.orb-locked-overlay{
  position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,0.55);
  display:flex;align-items:center;justify-content:center;z-index:5;font-size:1.8rem;
}

/* Orb themes */
.orb-t1{background:radial-gradient(circle at 35% 30%, #1a4a2e, #071508);color:#4ade80;}
.orb-t1 .orb-glow{background:radial-gradient(circle, rgba(45,158,95,0.35) 0%, transparent 70%);}
.orb-t1 .orb-label-top{color:#4ade80;text-shadow:0 0 14px rgba(74,222,128,0.5);}
.orb-t1 .orb-label-bot{color:#4ade80;}
.orb-t1 .orb-ring{border-color:rgba(74,222,128,0.25);}

.orb-t2{background:radial-gradient(circle at 35% 30%, #1e3a10, #0a1c04);color:#84cc16;}
.orb-t2 .orb-glow{background:radial-gradient(circle, rgba(132,204,22,0.3) 0%, transparent 70%);}
.orb-t2 .orb-label-top{color:#84cc16;text-shadow:0 0 14px rgba(132,204,22,0.5);}
.orb-t2 .orb-label-bot{color:#84cc16;}
.orb-t2 .orb-ring{border-color:rgba(132,204,22,0.2);}

.orb-t3{background:radial-gradient(circle at 35% 30%, #1e3a52, #050f1a);color:#38bdf8;}
.orb-t3 .orb-glow{background:radial-gradient(circle, rgba(56,189,248,0.3) 0%, transparent 70%);}
.orb-t3 .orb-label-top{color:#38bdf8;text-shadow:0 0 14px rgba(56,189,248,0.5);}
.orb-t3 .orb-label-bot{color:#38bdf8;}
.orb-t3 .orb-ring{border-color:rgba(56,189,248,0.2);}

.orb-t4{background:radial-gradient(circle at 35% 30%, #3d2008, #140a02);color:#f59e0b;}
.orb-t4 .orb-glow{background:radial-gradient(circle, rgba(245,158,11,0.3) 0%, transparent 70%);}
.orb-t4 .orb-label-top{color:#fbbf24;text-shadow:0 0 14px rgba(251,191,36,0.5);}
.orb-t4 .orb-label-bot{color:#fbbf24;}
.orb-t4 .orb-ring{border-color:rgba(251,191,36,0.2);}

.orb-t5{background:radial-gradient(circle at 35% 30%, #2a1040, #0b0519);color:#a78bfa;}
.orb-t5 .orb-glow{background:radial-gradient(circle, rgba(167,139,250,0.3) 0%, transparent 70%);}
.orb-t5 .orb-label-top{color:#a78bfa;text-shadow:0 0 14px rgba(167,139,250,0.5);}
.orb-t5 .orb-label-bot{color:#a78bfa;}
.orb-t5 .orb-ring{border-color:rgba(167,139,250,0.2);}

.orb-t6{background:radial-gradient(circle at 35% 30%, #1a3a3a, #040f10);color:#2dd4bf;}
.orb-t6 .orb-glow{background:radial-gradient(circle, rgba(45,212,191,0.3) 0%, transparent 70%);}
.orb-t6 .orb-label-top{color:#2dd4bf;text-shadow:0 0 14px rgba(45,212,191,0.5);}
.orb-t6 .orb-label-bot{color:#2dd4bf;}
.orb-t6 .orb-ring{border-color:rgba(45,212,191,0.2);}

/* Click explosion */
@keyframes orbExplode{
  0%{transform:scale(1);opacity:1;}
  30%{transform:scale(1.35);opacity:.9;}
  60%{transform:scale(0.85);opacity:.6;}
  100%{transform:scale(3);opacity:0;}
}
.orb3d.exploding{animation:orbExplode .5s cubic-bezier(.4,0,.8,1) forwards !important;}
.exp-burst{
  position:absolute;top:50%;left:50%;width:0;height:0;pointer-events:none;z-index:50;
}
.exp-spark2{
  position:absolute;width:8px;height:8px;border-radius:50%;
  animation:spark2 .55s ease-out forwards;
}
@keyframes spark2{
  0%{transform:translate(-50%,-50%) rotate(var(--a)) translateX(10px);opacity:1;}
  100%{transform:translate(-50%,-50%) rotate(var(--a)) translateX(var(--d));opacity:0;}
}
.exp-ring3{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  border-radius:50%;border:3px solid;opacity:0;
  animation:ring3 .5s ease-out forwards;
}
@keyframes ring3{
  0%{width:10px;height:10px;opacity:.9;}
  100%{width:220px;height:220px;opacity:0;}
}
.flash-overlay{
  position:fixed;inset:0;pointer-events:none;z-index:99;
  animation:flashOut .35s ease-out forwards;
}
@keyframes flashOut{0%{opacity:.4}100%{opacity:0}}

/* Subtopic reveal */
.subtopic-reveal-card{overflow:visible;}
.subtopic-reveal-grid{display:grid;grid-template-columns:1fr;gap:8px;margin-top:8px;width:100%;}
.subtopic-btn{
  font-family:'Nunito',sans-serif;font-weight:700;font-size:.92rem;
  padding:12px 16px;border-radius:13px;border:1px solid rgba(255,255,255,.07);
  background:rgba(255,255,255,.03);color:#e2e8f0;cursor:pointer;
  transition:all 0.15s;text-align:left;display:flex;align-items:center;gap:11px;
  animation:stReveal .4s cubic-bezier(.22,.82,.26,1) both;
}
@keyframes stReveal{from{opacity:0;transform:translateY(14px) scale(.97);}to{opacity:1;transform:none;}}
.subtopic-btn:hover{transform:translateX(5px);}
.subtopic-btn.locked{opacity:.3;cursor:not-allowed;}
.subtopic-btn.locked:hover{transform:none;background:rgba(255,255,255,.03);}
.snum{font-family:'Oswald',sans-serif;font-size:1rem;font-weight:600;color:#475569;min-width:26px;flex-shrink:0;}
.sicon{font-size:1.3rem;flex-shrink:0;}
.stitle{font-size:.9rem;font-weight:700;}
.sstatus{font-size:.67rem;color:var(--text-mid);margin-top:1px;font-weight:400;}
.coming-badge{background:rgba(245,158,11,.1);color:#fbbf24;border:1px solid rgba(245,158,11,.3);border-radius:8px;padding:2px 8px;font-size:.67rem;font-weight:700;margin-left:auto;white-space:nowrap;flex-shrink:0;}
.ready-badge{background:rgba(45,158,95,.1);color:#4ade80;border:1px solid rgba(45,158,95,.3);border-radius:8px;padding:2px 8px;font-size:.67rem;font-weight:700;margin-left:auto;white-space:nowrap;flex-shrink:0;}

/* MODE SCREEN */
.mode-screen h2{font-family:'Playfair Display',serif;font-style:italic;font-size:1.3rem;font-weight:400;color:#fff;margin-bottom:4px;text-align:center;}
.mode-screen .sub{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:#2d5a35;font-weight:700;margin-bottom:18px;text-align:center;}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.mode-btn{font-family:'Nunito',sans-serif;font-weight:800;font-size:.88rem;padding:16px 10px;border-radius:14px;border:1px solid;cursor:pointer;transition:all 0.18s;text-align:center;position:relative;overflow:hidden;background:rgba(10,17,10,.85);}
.mode-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.04) 0%,transparent 60%);pointer-events:none;}
.mode-btn .btn-icon{font-size:1.8rem;display:block;margin-bottom:5px;filter:drop-shadow(0 0 8px currentColor);}
.mode-btn .btn-label{display:block;font-size:.88rem;color:#e2e8f0;}
.mode-btn .btn-sub{display:block;font-size:.65rem;font-weight:400;color:var(--text-mid);margin-top:3px;}
.mode-btn.igaz{border-color:rgba(45,158,95,.3);color:#4ade80;}
.mode-btn.igaz:hover{border-color:rgba(45,158,95,.7);background:rgba(45,158,95,.08);transform:translateY(-3px);box-shadow:0 8px 24px rgba(45,158,95,.15);}
.mode-btn.kviz{border-color:rgba(56,189,248,.3);color:#7dd3fc;}
.mode-btn.kviz:hover{border-color:rgba(56,189,248,.7);background:rgba(56,189,248,.08);transform:translateY(-3px);box-shadow:0 8px 24px rgba(56,189,248,.15);}
.mode-btn.lyukas{border-color:rgba(245,158,11,.3);color:#fbbf24;}
.mode-btn.lyukas:hover{border-color:rgba(245,158,11,.7);background:rgba(245,158,11,.08);transform:translateY(-3px);box-shadow:0 8px 24px rgba(245,158,11,.15);}
.mode-btn.sort{border-color:rgba(244,63,94,.3);color:#fb7185;}
.mode-btn.sort:hover{border-color:rgba(244,63,94,.7);background:rgba(244,63,94,.08);transform:translateY(-3px);box-shadow:0 8px 24px rgba(244,63,94,.15);}
.mode-btn.cat{border-color:rgba(167,139,250,.3);color:#a78bfa;}
.mode-btn.cat:hover{border-color:rgba(167,139,250,.7);background:rgba(167,139,250,.08);transform:translateY(-3px);box-shadow:0 8px 24px rgba(167,139,250,.15);}

/* GAME TOPBAR */
.top-bar{display:flex;align-items:center;gap:7px;margin-bottom:18px;flex-wrap:wrap;}
.q-counter{font-family:'Oswald',sans-serif;font-weight:600;font-size:.9rem;color:#5a8a60;white-space:nowrap;min-width:60px;}
.back-game-btn{font-family:'Oswald',sans-serif;font-size:.72rem;font-weight:500;background:transparent;border:1px solid rgba(255,255,255,.12);color:#475569;border-radius:12px;padding:4px 10px;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.back-game-btn:hover{border-color:rgba(244,63,94,.4);color:#fb7185;background:rgba(244,63,94,.07);}
.prog-wrap{flex:1;background:rgba(255,255,255,.06);border-radius:20px;height:4px;overflow:hidden;min-width:50px;}
.prog-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,#166534,#4ade80);transition:width 0.5s cubic-bezier(.4,0,.2,1);}
.score-pill{font-family:'Oswald',sans-serif;font-weight:600;font-size:.88rem;background:rgba(45,158,95,.12);border:1px solid rgba(45,158,95,.3);border-radius:20px;padding:3px 11px;color:#4ade80;white-space:nowrap;}
.timer-pill{font-family:'Oswald',sans-serif;font-weight:600;font-size:.88rem;background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.25);border-radius:20px;padding:3px 11px;color:#7dd3fc;white-space:nowrap;}
.streak-pill{font-family:'Oswald',sans-serif;font-weight:600;font-size:.88rem;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.25);border-radius:20px;padding:3px 11px;color:#fbbf24;white-space:nowrap;transition:all .3s;}
.streak-pill.pop{animation:streakPop 0.4s cubic-bezier(.4,0,.2,1);}
@keyframes streakPop{0%{transform:scale(1)}40%{transform:scale(1.45) rotate(-6deg)}70%{transform:scale(0.92) rotate(4deg)}100%{transform:scale(1) rotate(0)}}
.streak-pill.on-fire{background:linear-gradient(90deg,rgba(251,191,36,.2),rgba(239,68,68,.2));border-color:rgba(239,68,68,.5);color:#fca5a5;}
.streak-pill.broken{background:rgba(244,63,94,.1);border-color:rgba(244,63,94,.4);color:#fb7185;animation:streakBreak .45s ease;}
@keyframes streakBreak{0%{transform:scale(1)}30%{transform:scale(1.12) rotate(8deg)}65%{transform:scale(.9) rotate(-5deg)}100%{transform:scale(1) rotate(0)}}

/* QUESTION */
.diff-badge{display:inline-block;border-radius:20px;padding:3px 13px;font-family:'Oswald',sans-serif;font-size:.72rem;font-weight:600;margin-bottom:13px;letter-spacing:.05em;}
.diff-1{background:rgba(45,158,95,.1);color:#4ade80;border:1px solid rgba(45,158,95,.3);}
.diff-2{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.3);}
.diff-3{background:rgba(244,63,94,.1);color:#fb7185;border:1px solid rgba(244,63,94,.3);}
.q-number{font-family:'Oswald',sans-serif;font-size:.78rem;font-weight:500;color:#475569;margin-bottom:5px;letter-spacing:.05em;}
.q-text{font-family:'Nunito',sans-serif;font-size:1.08rem;font-weight:600;color:#e2e8f0;line-height:1.55;margin-bottom:18px;}

/* TF */
.tf-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:13px;}
.ans-btn{font-family:'Oswald',sans-serif;font-size:1rem;font-weight:600;padding:15px 10px;border-radius:14px;border:1px solid;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-true{background:rgba(45,158,95,.08);color:#4ade80;border-color:rgba(45,158,95,.3);}
.btn-false{background:rgba(244,63,94,.08);color:#fb7185;border-color:rgba(244,63,94,.3);}
.ans-btn:hover:not(:disabled){transform:translateY(-3px) scale(1.04);box-shadow:0 8px 24px rgba(0,0,0,.3);}
.ans-btn:disabled{cursor:default;opacity:.7;}
.ans-btn.selected-correct{background:rgba(45,158,95,.2);border-color:#2d9e5f;box-shadow:0 0 20px rgba(45,158,95,.2);}
.ans-btn.selected-wrong{background:rgba(244,63,94,.2);border-color:#f43f5e;}
.ans-btn.reveal-correct{background:rgba(45,158,95,.15);border-color:#2d9e5f;}

/* QUIZ */
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:13px;}
.opt-btn{font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:600;padding:11px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:#cbd5e1;cursor:pointer;transition:all 0.15s;text-align:left;line-height:1.4;}
.opt-btn:hover:not(:disabled){background:rgba(45,158,95,.12);border-color:rgba(45,158,95,.4);color:#e2e8f0;}
.opt-btn:disabled{cursor:default;}
.opt-btn.selected-correct{background:rgba(45,158,95,.15);border-color:#2d9e5f;color:#4ade80;}
.opt-btn.selected-wrong{background:rgba(244,63,94,.15);border-color:#f43f5e;color:#fb7185;}
.opt-btn.reveal-correct{background:rgba(45,158,95,.1);border-color:rgba(45,158,95,.5);}

/* FILL */

<div id="app">

<script>
// ═══════════════════════════════════════════════
// FOREST BACKGROUND CANVAS
// ═══════════════════════════════════════════════
(function initForest(){
  const canvas = document.getElementById('forestCanvas');
  const ctx = canvas.getContext('2d');
  let W, H, stars=[], fireflies=[];

  function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // Stars
  for(let i=0;i<120;i++){
    stars.push({x:Math.random(),y:Math.random()*0.6,r:Math.random()*1.2+0.3,a:Math.random(),s:Math.random()*0.008+0.002});
  }
  // Fireflies
  for(let i=0;i<30;i++){
    fireflies.push({
      x:Math.random()*1,y:Math.random()*0.7+0.15,
      vx:(Math.random()-0.5)*0.0003,vy:(Math.random()-0.5)*0.0002,
      r:Math.random()*2+1,a:0,phase:Math.random()*Math.PI*2,
      speed:Math.random()*0.02+0.01,
      hue:Math.random()>0.5?120:60
    });
  }

  let t=0;
  function draw(){
    ctx.clearRect(0,0,W,H);

    // Sky gradient
    const sky = ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,'#020805');
    sky.addColorStop(0.5,'#041208');
    sky.addColorStop(1,'#0a1c0a');
    ctx.fillStyle=sky;
    ctx.fillRect(0,0,W,H);

    // Stars
    stars.forEach(s=>{
      s.a += s.s;
      const alpha = 0.3+Math.abs(Math.sin(s.a))*0.5;
      ctx.beginPath();
      ctx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2);
      ctx.fillStyle=`rgba(180,230,180,${alpha})`;
      ctx.fill();
    });

    // Moon glow
    const mx=W*0.82, my=H*0.12;
    const moonGlow = ctx.createRadialGradient(mx,my,0,mx,my,80);
    moonGlow.addColorStop(0,'rgba(200,255,200,0.06)');
    moonGlow.addColorStop(1,'transparent');
    ctx.fillStyle=moonGlow;
    ctx.fillRect(0,0,W,H);

    // Distant hills
    ctx.beginPath();
    ctx.moveTo(0,H*0.72);
    for(let x=0;x<=W;x+=8){
      const y = H*0.68 + Math.sin(x*0.005+t*0.05)*H*0.04 + Math.sin(x*0.012)*H*0.03;
      ctx.lineTo(x,y);
    }
    ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();
    ctx.fillStyle='rgba(10,28,12,0.9)';ctx.fill();

    // Mid trees silhouette
    for(let i=0;i<18;i++){
      const tx = (i/17)*W*1.1-W*0.05;
      const th = H*(0.22+Math.sin(i*1.7)*0.08);
      const ty = H*0.68-th;
      const tw = th*0.22;
      // trunk
      ctx.fillStyle='rgba(8,20,8,0.95)';
      ctx.fillRect(tx-tw*0.12, ty+th*0.7, tw*0.24, th*0.32);
      // canopy triangle
      ctx.beginPath();
      ctx.moveTo(tx, ty);
      ctx.lineTo(tx-tw*0.5, ty+th*0.45);
      ctx.lineTo(tx-tw*0.35, ty+th*0.45);
      ctx.lineTo(tx-tw*0.55, ty+th*0.75);
      ctx.lineTo(tx+tw*0.55, ty+th*0.75);
      ctx.lineTo(tx+tw*0.35, ty+th*0.45);
      ctx.lineTo(tx+tw*0.5, ty+th*0.45);
      ctx.closePath();
      ctx.fillStyle='rgba(5,18,7,0.98)';ctx.fill();
    }

    // Foreground trees (closer, darker)
    for(let i=0;i<8;i++){
      const tx=(i/7)*W;
      const th=H*(0.35+Math.sin(i*2.3)*0.1);
      const ty=H*0.75-th;
      const tw=th*0.28;
      ctx.fillStyle='rgba(4,12,4,1)';
      ctx.fillRect(tx-tw*0.14,ty+th*0.65,tw*0.28,th*0.37);
      ctx.beginPath();
      ctx.moveTo(tx,ty);
      ctx.lineTo(tx-tw*0.6,ty+th*0.5);
      ctx.lineTo(tx-tw*0.38,ty+th*0.5);
      ctx.lineTo(tx-tw*0.62,ty+th*0.78);
      ctx.lineTo(tx+tw*0.62,ty+th*0.78);
      ctx.lineTo(tx+tw*0.38,ty+th*0.5);
      ctx.lineTo(tx+tw*0.6,ty+th*0.5);
      ctx.closePath();
      ctx.fillStyle='rgba(3,10,4,1)';ctx.fill();
    }

    // Fireflies
    fireflies.forEach(f=>{
      f.x+=f.vx;f.y+=f.vy;
      f.x=(f.x+1)%1;f.y=Math.max(0.1,Math.min(0.85,f.y));
      f.phase+=f.speed;
      const alpha=Math.max(0,Math.sin(f.phase))*0.85;
      if(alpha>0){
        const fg=ctx.createRadialGradient(f.x*W,f.y*H,0,f.x*W,f.y*H,f.r*5);
        fg.addColorStop(0,`hsla(${f.hue},90%,70%,${alpha})`);
        fg.addColorStop(1,'transparent');
        ctx.fillStyle=fg;
        ctx.fillRect(f.x*W-f.r*5,f.y*H-f.r*5,f.r*10,f.r*10);
        ctx.beginPath();
        ctx.arc(f.x*W,f.y*H,f.r,0,Math.PI*2);
        ctx.fillStyle=`hsla(${f.hue},100%,85%,${alpha})`;
        ctx.fill();
      }
    });

    // Ground fog
    const fog=ctx.createLinearGradient(0,H*0.72,0,H);
    fog.addColorStop(0,'transparent');
    fog.addColorStop(0.3,'rgba(10,35,12,0.4)');
    fog.addColorStop(1,'rgba(5,18,6,0.95)');
    ctx.fillStyle=fog;ctx.fillRect(0,H*0.72,W,H*0.28);

    t++;
    requestAnimationFrame(draw);
  }
  draw();

  // Leaf particles
  const leafEmojis=['🍃','🌿','🍀','🌱','🍂'];
  for(let i=0;i<18;i++){
    const p=document.createElement('div');p.className='leaf-particle';
    p.textContent=leafEmojis[Math.floor(Math.random()*leafEmojis.length)];
    p.style.cssText=`left:${Math.random()*100}vw;animation-duration:${10+Math.random()*16}s;animation-delay:${Math.random()*14}s;font-size:${.7+Math.random()*.7}rem;`;
    document.body.appendChild(p);
  }
})();

function formatTime(s){const m=Math.floor(s/60),sec=s%60;return(m>0?m+' perc ':'')+sec+' mp';}
function streakLabel(){if(streak===0)return'🔥 0';if(streak>=5)return'🔥🔥 '+streak+'!!!';if(streak>=3)return'🔥 '+streak+'!';return'🔥 '+streak;}
function diffLabel(d){if(d===1)return['diff-1','🟢 Könnyű'];if(d===2)return['diff-2','🟡 Közepes'];return['diff-3','🔴 Nehéz'];}
function starsStr(sc,total){const p=sc/total;if(p>=0.9)return'⭐⭐⭐';if(p>=0.65)return'⭐⭐';return'⭐';}
function updateTimer(){elapsedSeconds=Math.floor((Date.now()-startTime)/1000);const el=document.getElementById('timerPill');if(el)el.textContent='⏱ '+formatTime(elapsedSeconds);}
function showToast(msg){const el=document.getElementById('toast');if(!el)return;el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2600);}

// ═══════════════════════════════════════════════
// ORB SPIN SYSTEM
// ═══════════════════════════════════════════════
function initOrbSpin(orbId, mirror){
  const orb = document.getElementById(orbId);
  if(!orb) return;
  let rotX=-15, rotY=mirror?-20:20, autoSpin=true, raf=null, lastT=null;
  const dir = mirror?-1:1;
  let dragging=false, moved=false, prev={x:0,y:0}, vel={x:0,y:0};

  const sphere = orb.querySelector('.orb-sphere');

  function apply(){
    if(sphere) sphere.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
  }

  function onStart(x,y){dragging=true;moved=false;autoSpin=false;prev={x,y};vel={x:0,y:0};cancelAnimationFrame(raf);lastT=null;}
  function onMove(x,y){
    if(!dragging)return;
    const dx=x-prev.x, dy=y-prev.y;
    if(Math.abs(dx)>2||Math.abs(dy)>2)moved=true;
    rotY+=dx*.6; rotX-=dy*.6;
    rotX=Math.max(-80,Math.min(80,rotX));
    vel={x:-dy*.5,y:dx*.5};prev={x,y};apply();
  }
  function onEnd(){
    if(!dragging)return;dragging=false;
    if(!moved){const id=orbId.replace('orb_','');triggerOrbClick(id);return;}
    (function mom(){vel.x*=.92;vel.y*=.92;rotX+=vel.x;rotY+=vel.y;rotX=Math.max(-80,Math.min(80,rotX));apply();
      if(Math.abs(vel.x)>.05||Math.abs(vel.y)>.05)raf=requestAnimationFrame(mom);else{autoSpin=true;requestAnimationFrame(spin);}})();
  }

  const scene = orb.closest('.orb-scene');
  scene.addEventListener('mousedown',e=>{e.preventDefault();onStart(e.clientX,e.clientY);});
  window.addEventListener('mousemove',e=>{if(dragging)onMove(e.clientX,e.clientY);});
  window.addEventListener('mouseup',()=>{if(dragging)onEnd();});
  scene.addEventListener('touchstart',e=>{onStart(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  window.addEventListener('touchmove',e=>{if(dragging)onMove(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  window.addEventListener('touchend',()=>{if(dragging)onEnd();},{passive:true});

  function spin(ts){
    if(!autoSpin||dragging){lastT=null;return;}
    if(!lastT)lastT=ts;
    const dt=ts-lastT;lastT=ts;
    rotY+=dt*.018*dir;
    rotX+=Math.sin(ts*.0005)*.3;
    apply();
    raf=requestAnimationFrame(spin);
  }
  setTimeout(()=>requestAnimationFrame(spin), Math.random()*300);
}

function triggerOrbClick(btId){
  const bt = BIG_TOPICS.find(b=>b.id===btId);
  if(!bt) return;
  const orbEl = document.getElementById('orb_'+btId);
  if(!orbEl||orbEl.classList.contains('exploding')) return;

  // explosion
  const wrapper = orbEl.closest('.orb-wrapper');
  const burst = document.createElement('div');burst.className='exp-burst';
  wrapper.style.position='relative';wrapper.appendChild(burst);

  const ring = document.createElement('div');ring.className='exp-ring3';
  ring.style.borderColor=bt.color;burst.appendChild(ring);

  for(let i=0;i<16;i++){
    const sp=document.createElement('div');sp.className='exp-spark2';
    const ang=(i/16)*360, dist=(50+Math.random()*60)+'px';
    sp.style.cssText=`--a:${ang}deg;--d:${dist};background:${bt.color};top:50%;left:50%;animation-delay:${Math.random()*.06}s;`;
    burst.appendChild(sp);
  }

  const flash=document.createElement('div');flash.className='flash-overlay';
  flash.style.background=bt.color.replace(')',',0.04)').replace('rgb','rgba');
  document.body.appendChild(flash);

  orbEl.classList.add('exploding');
  setTimeout(()=>{flash.remove();burst.remove();},600);
  setTimeout(()=>showSubtopicsInline(bt), 700);
}

// ═══════════════════════════════════════════════
function startGame(m){
  mode=m;current=0;score=0;streak=0;bestStreak=0;answered=false;
  startTime=Date.now();elapsedSeconds=0;
  if(timerInterval)clearInterval(timerInterval);
  timerInterval=setInterval(updateTimer,1000);
  render();
}

function backToModes(){
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
  score=0;streak=0;bestStreak=0;current=0;answered=false;
  showModes(currentTopic.id);
}

function render(){
  const area=document.getElementById('gameArea');
  const questions=mode==='tf'?currentTopic.tf:mode==='quiz'?currentTopic.quiz:mode==='fill'?currentTopic.fill:mode==='sort'?currentTopic.sort:currentTopic.cat;
  const total=questions.length;

  if(current>=total){
    if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
    const pct=Math.round(score/total*100);
    let emoji,title,sub;
    if(pct>=90){emoji='🏆';title='Mester szint!';sub='Szinte tökéletes — gratulálunk, '+playerName+'!';}
    else if(pct>=70){emoji='🌟';title='Nagyszerű munka!';sub='Nagyon jól ismered az anyagot!';}
    else if(pct>=50){emoji='🌱';title='Jó kezdet!';sub='Nézd át újra és biztosan jobban megy!';}
    else{emoji='🍃';title='Még gyakorolni kell!';sub='Olvasd el a tananyagot és próbáld újra!';}
    const modeLabel=mode==='tf'?'Igaz/Hamis':mode==='quiz'?'Kvíz':mode==='fill'?'Lyukas szöveg':mode==='sort'?'Sorrendbe állítás':'Kategorizálás';
    area.innerHTML=`
      <div class="card result-screen">
        <span class="result-emoji">${emoji}</span>
        <div class="stars">${starsStr(score,total)}</div>
        <div class="result-title">${title}</div>
        <div class="result-sub">${sub}</div>
        <div class="result-grid">
          <div class="stat-box"><div class="stat-num">${score} / ${total}</div><div class="stat-lbl">✅ Helyes</div></div>
          <div class="stat-box"><div class="stat-num">${pct}%</div><div class="stat-lbl">📊 Arány</div></div>
          <div class="stat-box time-stat"><div class="stat-num">${formatTime(elapsedSeconds)}</div><div class="stat-lbl">⏱ Idő</div></div>
          <div class="stat-box streak-stat"><div class="stat-num">${bestStreak}</div><div class="stat-lbl">🔥 Legjobb sorozat</div></div>
        </div>
        <div class="saving-msg" id="savingMsg">⏳ Eredmény mentése...</div>
        <div class="result-btns">
          <button class="rbtn orange" onclick="startGame('${mode}')">🔄 Újra</button>
          <button class="rbtn green" onclick="showModes(${currentTopic.id})">📚 Módok</button>
          <button class="rbtn blue" onclick="showMainMenu()">🏠 Főmenü</button>
        </div>
      </div>`;
    saveResult(playerName,currentBigTopic.title,currentTopic.title,modeLabel,score,total,elapsedSeconds,bestStreak);
    return;
  }

  const q=questions[current];
  const[dClass,dLabel]=diffLabel(q.diff);
  const prog=Math.round((current/total)*100);
  const onFire=streak>=3;
  const nextLabel=current+1<total?'Következő ➡️':'Eredmény 🏆';
  const topBar=`
    <div class="top-bar">
      <button class="back-game-btn" onclick="backToModes()">← Módok</button>
      <div class="q-counter">${current+1} / ${total}</div>
      <div class="prog-wrap"><div class="prog-fill" style="width:${prog}%"></div></div>
      <div class="score-pill">🌿 ${score}</div>
      <div class="streak-pill ${onFire?'on-fire':''}" id="streakPill">${streakLabel()}</div>
      <div class="timer-pill" id="timerPill">⏱ ${formatTime(elapsedSeconds)}</div>
    </div>`;

  if(mode==='fill') renderFill(area,q,topBar,dClass,dLabel,nextLabel);
  else if(mode==='sort') renderSort(area,q,topBar,dClass,dLabel,nextLabel);
  else if(mode==='cat') renderCat(area,q,topBar,dClass,dLabel,nextLabel);
  else {
    let ansHTML='';
    if(mode==='tf'){
      ansHTML=`<div class="tf-row"><button class="ans-btn btn-true" id="btnTrue" onclick="answerTF(true)">✅ IGAZ</button><button class="ans-btn btn-false" id="btnFalse" onclick="answerTF(false)">❌ HAMIS</button></div>`;
    } else {
      ansHTML='<div class="opts-grid">';
      q.opts.forEach((o,i)=>{ansHTML+=`<button class="opt-btn" id="opt${i}" onclick="answerQuiz(${i})">${o}</button>`;});
      ansHTML+='</div>';
    }
    area.innerHTML=topBar+`<div class="card"><div class="q-number">📋 ${current+1}. kérdés — ${playerName}</div><span class="diff-badge ${dClass}">${dLabel}</span><div class="q-text">${q.text}</div>${ansHTML}<div class="feedback" id="feedback"></div><button class="next-btn" id="nextBtn" onclick="next()">${nextLabel}</button></div>`;
    answered=false;
  }
}

function renderFill(area,q,topBar,dClass,dLabel,nextLabel){
  let sentenceHTML='<div class="fill-sentence">';
  q.parts.forEach(part=>{
    if(typeof part==='string'){sentenceHTML+=part;}
    else{
      const gap=q.gaps.find(g=>g.id===part.id);
      const shuffled=[...gap.options].sort(()=>Math.random()-.5);
      sentenceHTML+=`<select class="fill-select" id="gap${gap.id}"><option value="">— válassz —</option>`;
      shuffled.forEach(opt=>{sentenceHTML+=`<option value="${opt}">${opt}</option>`;});
      sentenceHTML+=`</select>`;
    }
  });
  sentenceHTML+='</div>';
  area.innerHTML=topBar+`<div class="card"><div class="q-number">✏️ ${current+1}. mondat — ${playerName}</div><span class="diff-badge ${dClass}">${dLabel}</span><p class="fill-hint">Válaszd ki a legördülő menüből a megfelelő szót!</p>${sentenceHTML}<div class="fill-result" id="fillResult"></div><button class="check-fill-btn" id="checkBtn" onclick="checkFill()">✅ Ellenőrzés</button><button class="next-btn" id="nextBtn" onclick="next()">${nextLabel}</button></div>`;
  answered=false;
}

function checkFill(){
  if(answered)return;
  const q=currentTopic.fill[current];
  let allCorrect=true,anyEmpty=false;
  q.gaps.forEach(gap=>{
    const sel=document.getElementById('gap'+gap.id);
    if(!sel.value)anyEmpty=true;
    else if(sel.value!==gap.correct)allCorrect=false;
  });
  if(anyEmpty){const res=document.getElementById('fillResult');res.className='fill-result show partial';res.textContent='⚠️ Kérlek töltsd ki az összes üres helyet!';return;}
  answered=true;document.getElementById('checkBtn').disabled=true;
  q.gaps.forEach(gap=>{const sel=document.getElementById('gap'+gap.id);sel.disabled=true;sel.classList.add(sel.value===gap.correct?'correct':'wrong');});
  if(allCorrect){score++;streak++;if(streak>bestStreak)bestStreak=streak;}else{streak=0;}
  updateStreakPill(allCorrect);
  let correctText='A helyes válasz: ';q.gaps.forEach((gap,i)=>{if(i>0)correctText+=', ';correctText+='"'+gap.correct+'"';});
  const res=document.getElementById('fillResult');
  if(allCorrect){let p='✅ Helyes! ';if(streak>=5)p='🔥🔥 '+streak+' sorozat! ';else if(streak>=3)p='🔥 '+streak+' sorozat! ';res.className='fill-result show correct';res.textContent=p+'Minden szót jól választottál!';}
  else{res.className='fill-result show wrong';res.textContent='❌ Nem egészen. '+correctText;}
  document.getElementById('nextBtn').classList.add('show');
}

function updateStreakPill(correct){
  const pill=document.getElementById('streakPill');
  if(!pill)return;
  pill.textContent=streakLabel();pill.className='streak-pill';void pill.offsetWidth;
  if(!correct)pill.classList.add('broken');
  else{if(streak>=3)pill.classList.add('on-fire');pill.classList.add('pop');}
}

function handleResult(correct,explain){
  if(correct){score++;streak++;if(streak>bestStreak)bestStreak=streak;}else streak=0;
  updateStreakPill(correct);
  const fb=document.getElementById('feedback');
  let prefix=correct?'✅ Helyes! ':'❌ Nem egészen. ';
  if(correct&&streak>=5)prefix='🔥🔥 '+streak+' egymás utáni helyes! ';
  else if(correct&&streak>=3)prefix='🔥 '+streak+' sorozat! ';
  fb.className='feedback show '+(correct?'correct':'wrong');fb.textContent=prefix+explain;
  document.getElementById('nextBtn').classList.add('show');
}

function answerTF(choice){
  if(answered)return;answered=true;
  const q=currentTopic.tf[current];const correct=choice===q.answer;
  const bT=document.getElementById('btnTrue'),bF=document.getElementById('btnFalse');
  bT.disabled=true;bF.disabled=true;
  const chosen=choice?bT:bF;
  if(correct)chosen.classList.add('selected-correct');
  else{chosen.classList.add('selected-wrong');(q.answer?bT:bF).classList.add('reveal-correct');}
  handleResult(correct,q.explain);
}

function answerQuiz(i){
  if(answered)return;answered=true;
  const q=currentTopic.quiz[current];const correct=i===q.correct;
  for(let j=0;j<q.opts.length;j++){
    const btn=document.getElementById('opt'+j);btn.disabled=true;
    if(j===i&&correct)btn.classList.add('selected-correct');
    else if(j===i&&!correct)btn.classList.add('selected-wrong');
    else if(j===q.correct)btn.classList.add('reveal-correct');
  }
  handleResult(correct,q.explain);
}

function next(){current++;render();window.scrollTo({top:0,behavior:'smooth'});}

// ═══════════════════════════════════════════════
// SORT
// ═══════════════════════════════════════════════
function renderSort(area,q,topBar,dClass,dLabel,nextLabel){
  const shuffled=q.items.map((text,i)=>({text,origIdx:i}));
  for(let i=shuffled.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];}
  let itemsHTML='';
  shuffled.forEach((item,i)=>{itemsHTML+=`<div class="sort-item" data-idx="${i}" data-orig="${item.origIdx}"><span class="sort-handle">☰</span><span class="sort-num">${i+1}.</span><span>${item.text}</span></div>`;});
  area.innerHTML=topBar+`<div class="card"><div class="q-number">🔢 ${current+1}. feladat — ${playerName}</div><span class="diff-badge ${dClass}">${dLabel}</span><div class="q-text">${q.question}</div><div class="sort-intro">💡 Húzd a sorokat a helyes sorrendbe!</div><div class="sort-list" id="sortList">${itemsHTML}</div><div class="sort-result" id="sortResult"></div><button class="sort-check-btn" id="sortCheckBtn" onclick="checkSort()">✅ Ellenőrzés</button><button class="next-btn" id="nextBtn" onclick="next()">${nextLabel}</button></div>`;
  answered=false;updateSortNumbers();initSortDrag();
}

function updateSortNumbers(){document.querySelectorAll('.sort-item').forEach((el,i)=>{el.querySelector('.sort-num').textContent=(i+1)+'.'});}

function initSortDrag(){
  const list=document.getElementById('sortList');if(!list)return;
  let dragEl=null,ghost=null,startX=0,startY=0,placeholder=null;
  function getItems(){return[...list.querySelectorAll('.sort-item')];}
  function createGhost(el,cx,cy){const r=el.getBoundingClientRect();ghost=el.cloneNode(true);ghost.style.cssText=`position:fixed;z-index:9999;left:${r.left}px;top:${r.top}px;width:${r.width}px;opacity:.85;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.5);transform:scale(1.03);transition:none;background:rgba(45,158,95,.18);border:1px solid rgba(45,158,95,.6);border-radius:12px;`;document.body.appendChild(ghost);startX=cx-r.left;startY=cy-r.top;}
  function moveGhost(cx,cy){if(!ghost)return;ghost.style.left=(cx-startX)+'px';ghost.style.top=(cy-startY)+'px';}
  function getTarget(cy){const items=getItems().filter(el=>el!==dragEl&&el!==placeholder);for(let i=0;i<items.length;i++){const r=items[i].getBoundingClientRect();if(cy<r.top+r.height/2)return{el:items[i],before:true};}return{el:items[items.length-1]||null,before:false};}
  function onStart(el,cx,cy){if(answered)return;dragEl=el;const r=el.getBoundingClientRect();placeholder=document.createElement('div');placeholder.className='sort-item';placeholder.style.cssText=`opacity:.25;border:1px dashed rgba(45,158,95,.4);background:rgba(45,158,95,.05);height:${r.height}px;`;list.insertBefore(placeholder,dragEl.nextSibling);dragEl.classList.add('dragging');createGhost(el,cx,cy);}
  function onMove(cx,cy){if(!dragEl)return;moveGhost(cx,cy);const t=getTarget(cy);if(t.el){if(t.before)list.insertBefore(placeholder,t.el);else list.insertBefore(placeholder,t.el.nextSibling);}getItems().forEach(el=>el.classList.remove('drag-over'));const t2=getTarget(cy);if(t2.el)t2.el.classList.add('drag-over');}
  function onEnd(){if(!dragEl)return;dragEl.classList.remove('dragging');getItems().forEach(el=>el.classList.remove('drag-over'));if(placeholder&&placeholder.parentNode){list.insertBefore(dragEl,placeholder);placeholder.remove();}if(ghost){ghost.remove();ghost=null;}dragEl=null;placeholder=null;updateSortNumbers();}
  list.addEventListener('mousedown',e=>{const item=e.target.closest('.sort-item');if(item)onStart(item,e.clientX,e.clientY);});
  document.addEventListener('mousemove',e=>{if(dragEl)onMove(e.clientX,e.clientY);});
  document.addEventListener('mouseup',()=>{if(dragEl)onEnd();});
  list.addEventListener('touchstart',e=>{const item=e.target.closest('.sort-item');if(item){e.preventDefault();onStart(item,e.touches[0].clientX,e.touches[0].clientY);}},{passive:false});
  document.addEventListener('touchmove',e=>{if(dragEl){e.preventDefault();onMove(e.touches[0].clientX,e.touches[0].clientY);}},{passive:false});
  document.addEventListener('touchend',()=>{if(dragEl)onEnd();},{passive:true});
}

function checkSort(){
  if(answered)return;
  const q=currentTopic.sort[current];
  const items=[...document.getElementById('sortList').querySelectorAll('.sort-item')];
  let allOk=true;
  items.forEach((el,i)=>{const origIdx=parseInt(el.getAttribute('data-orig'));const ok=origIdx===q.correct[i];if(!ok)allOk=false;el.classList.add(ok?'correct-item':'wrong-item');});
  answered=true;document.getElementById('sortCheckBtn').disabled=true;
  if(allOk){score++;streak++;if(streak>bestStreak)bestStreak=streak;}else{streak=0;}
  updateStreakPill(allOk);
  const res=document.getElementById('sortResult');
  if(allOk){let p='✅ Tökéletes sorrend! ';if(streak>=5)p='🔥🔥 '+streak+' sorozat! ';else if(streak>=3)p='🔥 '+streak+' sorozat! ';res.className='sort-result show correct';res.textContent=p+q.explain;}
  else{res.className='sort-result show wrong';res.textContent='❌ Nem egészen. '+q.explain;}
  document.getElementById('nextBtn').classList.add('show');
}

// ═══════════════════════════════════════════════
// CAT
// ═══════════════════════════════════════════════
function renderCat(area,q,topBar,dClass,dLabel,nextLabel){
  const shuffled=[...q.items].sort(()=>Math.random()-.5);
  let poolHTML='';
  shuffled.forEach((item,i)=>{poolHTML+=`<div class="cat-item" data-i="${i}" data-correct="${item.correct}" data-text="${item.text}">${item.text}</div>`;});
  area.innerHTML=topBar+`<div class="card"><div class="q-number">🗂️ ${current+1}. feladat — ${playerName}</div><span class="diff-badge ${dClass}">${dLabel}</span><div class="q-text">${q.question}</div><div class="cat-intro">💡 Húzd (vagy koppints) a kártyákat a megfelelő dobozba!</div><div class="cat-items-pool" id="catPool">${poolHTML}</div><div class="cat-boxes"><div class="cat-box box-yes" id="catBoxYes"><div class="cat-box-title">${q.boxYes}</div><div class="cat-box-items" id="catBoxYesItems"></div></div><div class="cat-box box-no" id="catBoxNo"><div class="cat-box-title">${q.boxNo}</div><div class="cat-box-items" id="catBoxNoItems"></div></div></div><div class="cat-result" id="catResult"></div><button class="cat-check-btn" id="catCheckBtn" onclick="checkCat()">✅ Ellenőrzés</button><button class="next-btn" id="nextBtn" onclick="next()">${nextLabel}</button></div>`;
  answered=false;initCatDrag();
}

function initCatDrag(){
  let dragEl=null,ghost=null,startX=0,startY=0;
  function getZone(cx,cy){for(const id of['catBoxYes','catBoxNo','catPool']){const el=document.getElementById(id);if(!el)continue;const r=el.getBoundingClientRect();if(cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom)return el;}return null;}
  function createGhost(el,cx,cy){const r=el.getBoundingClientRect();ghost=el.cloneNode(true);ghost.style.cssText=`position:fixed;z-index:9999;left:${r.left}px;top:${r.top}px;width:${r.width}px;opacity:.9;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.5);transform:scale(1.08);transition:none;`;document.body.appendChild(ghost);startX=cx-r.left;startY=cy-r.top;}
  function moveGhost(cx,cy){if(!ghost)return;ghost.style.left=(cx-startX)+'px';ghost.style.top=(cy-startY)+'px';['catBoxYes','catBoxNo','catPool'].forEach(id=>{const el=document.getElementById(id);if(el)el.classList.remove('drag-active');});const z=getZone(cx,cy);if(z)z.classList.add('drag-active');}
  function onStart(el,cx,cy){if(answered)return;dragEl=el;createGhost(el,cx,cy);el.style.opacity='.3';}
  function onEnd(cx,cy){
    if(!dragEl)return;dragEl.style.opacity='';if(ghost){ghost.remove();ghost=null;}
    ['catBoxYes','catBoxNo','catPool'].forEach(id=>{const el=document.getElementById(id);if(el)el.classList.remove('drag-active');});
    const z=getZone(cx,cy);
    if(z){if(z.id==='catBoxYes'){document.getElementById('catBoxYesItems').appendChild(dragEl);dragEl.setAttribute('data-placed','yes');}else if(z.id==='catBoxNo'){document.getElementById('catBoxNoItems').appendChild(dragEl);dragEl.setAttribute('data-placed','no');}else{document.getElementById('catPool').appendChild(dragEl);dragEl.removeAttribute('data-placed');}}
    dragEl=null;
  }
  function catClick(el){if(answered)return;const p=el.getAttribute('data-placed');if(!p){document.getElementById('catBoxYesItems').appendChild(el);el.setAttribute('data-placed','yes');}else if(p==='yes'){document.getElementById('catBoxNoItems').appendChild(el);el.setAttribute('data-placed','no');}else{document.getElementById('catPool').appendChild(el);el.removeAttribute('data-placed');}}
  const cont=document.querySelector('.card');if(!cont)return;
  cont.addEventListener('mousedown',e=>{const item=e.target.closest('.cat-item');if(item)onStart(item,e.clientX,e.clientY);});
  document.addEventListener('mousemove',e=>{if(dragEl)moveGhost(e.clientX,e.clientY);});
  document.addEventListener('mouseup',e=>{if(dragEl){const dx=Math.abs(e.clientX-(parseFloat(ghost.style.left)+startX)),dy=Math.abs(e.clientY-(parseFloat(ghost.style.top)+startY));if(dx<6&&dy<6){const el=dragEl;if(ghost){ghost.remove();ghost=null;}dragEl.style.opacity='';dragEl=null;catClick(el);return;}onEnd(e.clientX,e.clientY);}});
  cont.addEventListener('touchstart',e=>{const item=e.target.closest('.cat-item');if(item){e.preventDefault();onStart(item,e.touches[0].clientX,e.touches[0].clientY);}},{passive:false});
  document.addEventListener('touchmove',e=>{if(dragEl){e.preventDefault();moveGhost(e.touches[0].clientX,e.touches[0].clientY);}},{passive:false});
  document.addEventListener('touchend',e=>{if(dragEl){const t=e.changedTouches[0];onEnd(t.clientX,t.clientY);}},{passive:true});
}

function checkCat(){
  if(answered)return;
  const pool=document.getElementById('catPool');
  if(pool.querySelectorAll('.cat-item').length>0){const res=document.getElementById('catResult');res.className='cat-result show';res.style.background='rgba(251,191,36,.1)';res.style.border='1px solid rgba(251,191,36,.3)';res.style.color='#fbbf24';res.textContent='⚠️ Még nem soroltad be az összes kártyát!';return;}
  answered=true;document.getElementById('catCheckBtn').disabled=true;
  let allOk=true;
  document.querySelectorAll('.cat-item').forEach(el=>{const placedYes=el.getAttribute('data-placed')==='yes';const shouldBeYes=el.getAttribute('data-correct')==='true';const ok=placedYes===shouldBeYes;if(!ok)allOk=false;el.classList.add(ok?'correct-item':'wrong-item');});
  if(allOk){score++;streak++;if(streak>bestStreak)bestStreak=streak;}else{streak=0;}
  updateStreakPill(allOk);
  const res=document.getElementById('catResult');
  if(allOk){let p='✅ Tökéletes besorolás! ';if(streak>=5)p='🔥🔥 '+streak+' sorozat! ';else if(streak>=3)p='🔥 '+streak+' sorozat! ';res.className='cat-result show correct';res.textContent=p+currentTopic.cat[current].explain;}
  else{res.className='cat-result show wrong';res.textContent='❌ Nem teljesen. '+currentTopic.cat[current].explain;}
  document.getElementById('nextBtn').classList.add('show');
}

// ═══════════════════════════════════════════════
// SAVE
// ═══════════════════════════════════════════════
function saveResult(name,bigTopic,subTopic,modeLabel,score,total,time,bestStreak){
  fetch(SHEET_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({name,mode:bigTopic+' › '+subTopic+' — '+modeLabel,score:score+' / '+total,time:formatTime(time),bestStreak})})
  .then(r=>r.json())
  .then(()=>{const msg=document.getElementById('savingMsg');if(msg){msg.textContent='✅ Eredmény elmentve!';msg.className='saving-msg ok';}})
  .catch(()=>{const msg=document.getElementById('savingMsg');if(msg){msg.textContent='⚠️ Mentés nem sikerült.';msg.className='saving-msg err';}});
}

// ═══════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════
showMainMenu();
</script>
