<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R28 MTF Analyzer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Bebas+Neue&display=swap');

:root {
  --bg: #05070f;
  --surface: #0b0f1a;
  --surface2: #111827;
  --border: #1c2538;
  --border2: #243048;
  --orange: #f7931a;
  --cyan: #00d4ff;
  --green: #00e676;
  --red: #ff3b3b;
  --yellow: #ffd600;
  --text: #dce4f0;
  --muted: #4a5a7a;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Mono', monospace;
  min-height: 100vh;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  pointer-events: none;
  z-index: 9999;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: linear-gradient(rgba(0,212,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.02) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}

.wrap {
  position: relative;
  z-index: 1;
  max-width: 980px;
  margin: 0 auto;
  padding: 28px 18px 80px;
}

/* HEADER */
.hdr { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
.hdr h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(38px, 8vw, 68px); letter-spacing: 3px; color: var(--orange); text-shadow: 0 0 40px rgba(247,147,26,0.35); line-height: 1; }
.hdr p { font-size: 10px; color: var(--muted); letter-spacing: 2px; margin-top: 4px; text-transform: uppercase; }
.hdr-badge { background: rgba(0,212,255,0.07); border: 1px solid rgba(0,212,255,0.2); color: var(--cyan); font-size: 9px; letter-spacing: 2px; padding: 6px 12px; border-radius: 2px; text-transform: uppercase; }

.disc { background: rgba(255,59,59,0.05); border: 1px solid rgba(255,59,59,0.18); border-left: 3px solid var(--red); padding: 10px 14px; font-size: 9px; color: #ff9090; line-height: 1.7; border-radius: 3px; margin-bottom: 24px; }

/* FLOW INDICATOR */
.flow { display: flex; align-items: center; gap: 0; margin-bottom: 28px; overflow-x: auto; padding-bottom: 4px; }
.flow-step {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
}
.flow-dot {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 2px solid var(--border2);
  background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700;
  color: var(--muted);
  transition: all 0.3s;
  cursor: pointer;
}
.flow-dot.active { border-color: var(--orange); color: var(--orange); box-shadow: 0 0 12px rgba(247,147,26,0.3); background: rgba(247,147,26,0.08); }
.flow-dot.done-bull { border-color: var(--green); color: var(--green); background: rgba(0,230,118,0.08); }
.flow-dot.done-bear { border-color: var(--red); color: var(--red); background: rgba(255,59,59,0.08); }
.flow-dot.done-wait { border-color: var(--yellow); color: var(--yellow); background: rgba(255,214,0,0.08); }
.flow-dot.done-skip { border-color: var(--muted); color: var(--muted); background: var(--surface2); }
.flow-label { font-size: 8px; color: var(--muted); letter-spacing: 1px; }
.flow-arrow { color: var(--border2); font-size: 14px; padding: 0 4px; flex-shrink: 0; margin-bottom: 18px; }
.flow-step.summary-step .flow-dot { width: 44px; height: 44px; font-size: 10px; border-color: var(--cyan); color: var(--cyan); background: rgba(0,212,255,0.06); }
.flow-step.summary-step .flow-label { color: var(--cyan); }

/* TF CARD */
.tf-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 10px;
  margin-bottom: 16px;
  overflow: hidden;
  transition: all 0.3s;
}
.tf-card.active { border-color: var(--orange); box-shadow: 0 0 24px rgba(247,147,26,0.08); }
.tf-card.collapsed .tf-body { display: none; }

.tf-head {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 20px;
  cursor: pointer;
  user-select: none;
}
.tf-badge {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 2px;
  color: var(--orange);
  min-width: 44px;
}
.tf-head-info { flex: 1; }
.tf-head-info .tf-role { font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
.tf-head-info .tf-status { font-size: 10px; color: var(--text); margin-top: 2px; min-height: 14px; }
.tf-head-right { display: flex; align-items: center; gap: 10px; }
.tf-verdict-badge { font-size: 9px; letter-spacing: 1px; padding: 3px 10px; border-radius: 3px; border: 1px solid; display: none; }
.tf-verdict-badge.bull { color: var(--green); border-color: rgba(0,230,118,0.3); background: rgba(0,230,118,0.07); display: inline-block; }
.tf-verdict-badge.bear { color: var(--red); border-color: rgba(255,59,59,0.3); background: rgba(255,59,59,0.07); display: inline-block; }
.tf-verdict-badge.wait { color: var(--yellow); border-color: rgba(255,214,0,0.3); background: rgba(255,214,0,0.07); display: inline-block; }
.tf-verdict-badge.skip { color: var(--muted); border-color: var(--border); background: var(--surface2); display: inline-block; }
.tf-chevron { color: var(--muted); font-size: 12px; transition: transform 0.2s; }
.tf-card.collapsed .tf-chevron { transform: rotate(-90deg); }

.tf-body { padding: 0 20px 20px; }

/* Upload in card */
.mini-upload {
  border: 2px dashed var(--border2);
  border-radius: 8px;
  padding: 22px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  margin-bottom: 14px;
  background: rgba(0,0,0,0.2);
}
.mini-upload:hover { border-color: var(--orange); background: rgba(247,147,26,0.03); }
.mini-upload input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.mini-upload .mu-icon { font-size: 24px; }
.mini-upload .mu-text { font-size: 10px; color: var(--muted); margin-top: 6px; letter-spacing: 1px; }

.mini-preview { display: none; position: relative; margin-bottom: 14px; border-radius: 6px; overflow: hidden; border: 1px solid var(--border2); }
.mini-preview.show { display: block; }
.mini-preview img { width: 100%; max-height: 280px; object-fit: contain; background: #000; display: block; }
.mini-preview-clear { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.7); border: 1px solid var(--border2); color: var(--muted); font-size: 9px; padding: 4px 8px; border-radius: 3px; cursor: pointer; font-family: 'IBM Plex Mono', monospace; transition: all 0.2s; }
.mini-preview-clear:hover { color: var(--red); border-color: var(--red); }

.skip-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  padding: 7px 14px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 14px;
}
.skip-btn:hover { border-color: var(--muted); color: var(--text); }

.analyze-tf-btn {
  width: 100%;
  background: var(--orange);
  color: #000;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  letter-spacing: 2px;
  padding: 13px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
}
.analyze-tf-btn:hover:not(:disabled) { background: #ffb04a; box-shadow: 0 4px 24px rgba(247,147,26,0.3); }
.analyze-tf-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* Mini loading */
.mini-loading { display: none; text-align: center; padding: 24px; }
.mini-loading.show { display: block; }
.ml-ring { width: 36px; height: 36px; border: 2px solid var(--border2); border-top-color: var(--orange); border-right-color: var(--cyan); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
@keyframes spin { to { transform: rotate(360deg); } }
.ml-text { font-size: 9px; color: var(--muted); letter-spacing: 1px; }

/* TF Result */
.tf-result { display: none; }
.tf-result.show { display: block; }

.tf-res-verdict {
  padding: 14px 16px;
  border-radius: 7px;
  border: 1px solid;
  margin-bottom: 12px;
}
.tf-res-verdict.bull { background: rgba(0,230,118,0.05); border-color: rgba(0,230,118,0.2); }
.tf-res-verdict.bear { background: rgba(255,59,59,0.05); border-color: rgba(255,59,59,0.2); }
.tf-res-verdict.wait { background: rgba(255,214,0,0.05); border-color: rgba(255,214,0,0.2); }

.tf-res-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; margin-bottom: 6px; }
.tf-res-verdict.bull .tf-res-title { color: var(--green); }
.tf-res-verdict.bear .tf-res-title { color: var(--red); }
.tf-res-verdict.wait .tf-res-title { color: var(--yellow); }

.tf-res-body { font-size: 10px; color: #8a9ab8; line-height: 1.8; }
.tf-res-body strong { color: var(--text); }

.tf-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.tf-tag { font-size: 9px; padding: 3px 8px; border-radius: 3px; border: 1px solid; }
.tf-tag.g { color: var(--green); border-color: rgba(0,230,118,0.3); background: rgba(0,230,118,0.06); }
.tf-tag.r { color: var(--red); border-color: rgba(255,59,59,0.3); background: rgba(255,59,59,0.06); }
.tf-tag.y { color: var(--yellow); border-color: rgba(255,214,0,0.3); background: rgba(255,214,0,0.06); }
.tf-tag.c { color: var(--cyan); border-color: rgba(0,212,255,0.3); background: rgba(0,212,255,0.06); }
.tf-tag.m { color: var(--muted); border-color: var(--border); background: var(--surface2); }

/* SESSION INPUT */
.session-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
@media(max-width:500px) { .session-row { grid-template-columns: 1fr; } }
.ctx-group label { display: block; font-size: 9px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
.ctx-group select, .ctx-group input { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 9px 12px; border-radius: 5px; outline: none; transition: border-color 0.2s; appearance: none; }
.ctx-group select:focus, .ctx-group input:focus { border-color: var(--orange); }

/* SUMMARY */
.summary-section { display: none; }
.summary-section.show { display: block; }

.summary-card {
  background: var(--surface);
  border: 2px solid var(--cyan);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 0 40px rgba(0,212,255,0.06);
}
.summary-header { background: rgba(0,212,255,0.06); padding: 20px 24px 16px; border-bottom: 1px solid rgba(0,212,255,0.15); }
.summary-header h2 { font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 3px; color: var(--cyan); margin-bottom: 4px; }

.final-verdict-box {
  padding: 28px 24px;
  border-bottom: 1px solid var(--border);
}
.fv-eyebrow { font-size: 9px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
.fv-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(42px, 9vw, 64px); letter-spacing: 2px; line-height: 1; margin-bottom: 10px; }
.fv-title.long { color: var(--green); text-shadow: 0 0 30px rgba(0,230,118,0.3); }
.fv-title.short { color: var(--red); text-shadow: 0 0 30px rgba(255,59,59,0.3); }
.fv-title.wait { color: var(--yellow); text-shadow: 0 0 30px rgba(255,214,0,0.3); }
.fv-title.noentry { color: var(--muted); }
.fv-sub { font-size: 11px; color: #8a9ab8; line-height: 1.8; max-width: 580px; }
.fv-meta { display: flex; flex-wrap: wrap; gap: 18px; margin-top: 14px; font-size: 10px; color: var(--muted); }
.fv-meta span strong { color: var(--text); }

/* MTF Grid */
.mtf-grid { padding: 20px 24px; border-bottom: 1px solid var(--border); }
.mtf-grid h3 { font-size: 9px; letter-spacing: 3px; color: var(--cyan); text-transform: uppercase; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.mtf-table { display: grid; gap: 8px; }
.mtf-row { display: grid; grid-template-columns: 60px 90px 1fr; gap: 12px; align-items: center; font-size: 10px; }
.mtf-tf { font-weight: 700; color: var(--orange); }
.mtf-sig { padding: 3px 8px; border-radius: 3px; border: 1px solid; font-size: 9px; letter-spacing: 1px; text-align: center; }
.mtf-sig.bull { color: var(--green); border-color: rgba(0,230,118,0.3); background: rgba(0,230,118,0.07); }
.mtf-sig.bear { color: var(--red); border-color: rgba(255,59,59,0.3); background: rgba(255,59,59,0.07); }
.mtf-sig.wait { color: var(--yellow); border-color: rgba(255,214,0,0.3); background: rgba(255,214,0,0.07); }
.mtf-sig.skip { color: var(--muted); border-color: var(--border); background: var(--surface2); }
.mtf-note { font-size: 10px; color: #8a9ab8; }

/* Checklist */
.chk-section { padding: 20px 24px; border-bottom: 1px solid var(--border); }
.chk-section h3 { font-size: 9px; letter-spacing: 3px; color: var(--cyan); text-transform: uppercase; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.chk-list { display: grid; gap: 8px; }
.chk-item { display: flex; gap: 10px; font-size: 10px; color: #8a9ab8; line-height: 1.6; }
.chk-item .ic { flex-shrink: 0; width: 18px; }

/* Next steps */
.next-section { padding: 20px 24px; }
.next-section h3 { font-size: 9px; letter-spacing: 3px; color: var(--cyan); text-transform: uppercase; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.next-text { font-size: 11px; color: #8a9ab8; line-height: 1.9; white-space: pre-wrap; }
.next-text strong { color: var(--text); }

.btn-reset { display: block; margin: 24px auto 0; background: transparent; border: 1px solid var(--border2); color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 1px; padding: 10px 32px; border-radius: 5px; cursor: pointer; transition: all 0.2s; }
.btn-reset:hover { border-color: var(--orange); color: var(--orange); }

.footer-note { font-size: 9px; color: var(--muted); text-align: center; margin-top: 28px; line-height: 1.8; opacity: 0.5; }

/* Score bar */
.score-wrap { margin-top: 14px; }
.score-labels { display: flex; justify-content: space-between; font-size: 9px; color: var(--muted); margin-bottom: 4px; }
.score-track { height: 4px; background: var(--border); border-radius: 3px; overflow: hidden; }
.score-fill { height: 100%; border-radius: 3px; width: 0; transition: width 1.2s cubic-bezier(.4,0,.2,1); }

.analyze-all-btn {
  width: 100%;
  background: linear-gradient(135deg, var(--cyan), #0080ff);
  color: #000;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 3px;
  padding: 18px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 20px;
  display: none;
}
.analyze-all-btn.show { display: block; }
.analyze-all-btn:hover { opacity: 0.9; box-shadow: 0 4px 32px rgba(0,212,255,0.25); transform: translateY(-1px); }
.analyze-all-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

.summary-loading { display: none; text-align: center; padding: 40px; }
.summary-loading.show { display: block; }
.sl-ring { width: 48px; height: 48px; border: 3px solid var(--border2); border-top-color: var(--cyan); border-right-color: var(--orange); border-radius: 50%; animation: spin 0.9s linear infinite; margin: 0 auto 16px; }
.sl-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; color: var(--cyan); margin-bottom: 6px; }
.sl-step { font-size: 10px; color: var(--muted); letter-spacing: 1px; }
</style>
</head>
<body>
<div class="wrap">

  <div class="hdr">
    <div>
      <h1>R28 MTF Analyzer</h1>
      <p>Top-Down · 4H → 2H → 1H → 30M → 15M → 5M → 3M</p>
    </div>
    <div class="hdr-badge">Multi-Timeframe AI</div>
  </div>

  <div class="disc">⚠ NEM PÉNZÜGYI TANÁCSADÁS – Kizárólag oktatási célra, az R28 Trades Playbook alapján. A kereskedés magas kockázattal jár.</div>

  <!-- Flow indicator -->
  <div class="flow" id="flowIndicator"></div>

  <!-- Global context -->
  <div class="session-row" style="margin-bottom:20px">
    <div class="ctx-group">
      <label>Session</label>
      <select id="sessionSelect">
        <option value="">– válassz –</option>
        <option value="NY Open (15:30–17:00)">NY Open (15:30–17:00)</option>
        <option value="NY PM (17:00–23:00)">NY PM (17:00–23:00)</option>
        <option value="London (09:00–15:30)">London (09:00–15:30)</option>
        <option value="Ázsiai (00:00–09:00)">Ázsiai (00:00–09:00)</option>
      </select>
    </div>
    <div class="ctx-group">
      <label>BTC ár (opcionális)</label>
      <input type="text" id="priceInput" placeholder="pl. 67500">
    </div>
  </div>

  <!-- TF Cards -->
  <div id="tfCards"></div>

  <!-- Summarize button -->
  <button class="analyze-all-btn" id="summarizeBtn" onclick="runSummary()">
    📊 ÖSSZESÍTETT ELEMZÉS GENERÁLÁSA
  </button>

  <!-- Summary loading -->
  <div class="summary-loading" id="summaryLoading">
    <div class="sl-ring"></div>
    <div class="sl-title">Összesítés folyamatban...</div>
    <div class="sl-step" id="summaryStep">Timeframe-ek kiértékelése...</div>
  </div>

  <!-- Final Summary -->
  <div class="summary-section" id="summarySection"></div>

</div>

<script>
const TIMEFRAMES = [
  { id: '4H', label: '4H', role: 'Fő trend / Bias meghatározás' },
  { id: '2H', label: '2H', role: 'Középtávú struktúra' },
  { id: '1H', label: '1H', role: 'Kulcs szintek & FVG zónák' },
  { id: '30M', label: '30M', role: 'Finomítás & reaktív szintek' },
  { id: '15M', label: '15M', role: 'Belépő előkészítés' },
  { id: '5M', label: '5M', role: 'IFVG vadászat' },
  { id: '3M', label: '3M', role: 'Precíz belépő timeframe' },
];

let tfData = {};
TIMEFRAMES.forEach(tf => {
  tfData[tf.id] = { image: null, mime: 'image/jpeg', result: null, skipped: false };
});

// Build flow indicator
function buildFlow() {
  const el = document.getElementById('flowIndicator');
  el.innerHTML = '';
  TIMEFRAMES.forEach((tf, i) => {
    const d = tfData[tf.id];
    let cls = '';
    if (d.skipped) cls = 'done-skip';
    else if (d.result) {
      const v = d.result.verdict || '';
      cls = v === 'LONG' ? 'done-bull' : v === 'SHORT' ? 'done-bear' : v === 'VÁRJ' ? 'done-wait' : 'done-skip';
    }
    const step = document.createElement('div');
    step.className = 'flow-step';
    step.innerHTML = `<div class="flow-dot ${cls}" onclick="focusTf('${tf.id}')">${tf.label}</div><div class="flow-label">${cls.startsWith('done') ? (d.result ? d.result.verdict || 'SKIP' : 'SKIP') : '...'}</div>`;
    el.appendChild(step);
    if (i < TIMEFRAMES.length - 1) {
      const arrow = document.createElement('div');
      arrow.className = 'flow-arrow';
      arrow.textContent = '›';
      el.appendChild(arrow);
    }
  });
  // Summary dot
  const arrow = document.createElement('div');
  arrow.className = 'flow-arrow';
  arrow.textContent = '›';
  el.appendChild(arrow);
  const sumStep = document.createElement('div');
  sumStep.className = 'flow-step summary-step';
  sumStep.innerHTML = `<div class="flow-dot" style="width:44px;height:44px;border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,0.06);font-size:10px">∑</div><div class="flow-label" style="color:var(--cyan)">DÖNTÉS</div>`;
  el.appendChild(sumStep);
}

// Build TF cards
function buildCards() {
  const container = document.getElementById('tfCards');
  container.innerHTML = '';
  TIMEFRAMES.forEach((tf, idx) => {
    const card = document.createElement('div');
    card.className = 'tf-card' + (idx > 0 ? ' collapsed' : ' active');
    card.id = `card-${tf.id}`;
    card.innerHTML = `
      <div class="tf-head" onclick="toggleCard('${tf.id}')">
        <div class="tf-badge">${tf.label}</div>
        <div class="tf-head-info">
          <div class="tf-role">${tf.role}</div>
          <div class="tf-status" id="status-${tf.id}">Várakozás képre...</div>
        </div>
        <div class="tf-head-right">
          <span class="tf-verdict-badge" id="vbadge-${tf.id}"></span>
          <span class="tf-chevron">▾</span>
        </div>
      </div>
      <div class="tf-body">
        <div class="mini-upload" id="upload-${tf.id}">
          <input type="file" accept="image/*" onchange="handleTfFile(event,'${tf.id}')">
          <div class="mu-icon">📊</div>
          <div class="mu-text">${tf.label} CHART FELTÖLTÉSE<br><span style="font-size:9px;opacity:0.6">PNG / JPG · TradingView screenshot</span></div>
        </div>
        <div class="mini-preview" id="preview-${tf.id}">
          <img id="previewImg-${tf.id}" src="" alt="">
          <button class="mini-preview-clear" onclick="clearTfImage('${tf.id}')">✕</button>
        </div>
        <button class="skip-btn" onclick="skipTf('${tf.id}')">Kihagyás – nincs releváns szint ezen a TF-en</button>
        <button class="analyze-tf-btn" id="analyzeBtn-${tf.id}" onclick="analyzeTf('${tf.id}')" disabled>
          🔍 ${tf.label} ELEMZÉSE
        </button>
        <div class="mini-loading" id="loading-${tf.id}">
          <div class="ml-ring"></div>
          <div class="ml-text" id="loadingText-${tf.id}">Elemzés...</div>
        </div>
        <div class="tf-result" id="result-${tf.id}"></div>
      </div>
    `;
    container.appendChild(card);
  });
}

function toggleCard(tfId) {
  const card = document.getElementById(`card-${tfId}`);
  card.classList.toggle('collapsed');
}

function focusTf(tfId) {
  const card = document.getElementById(`card-${tfId}`);
  card.classList.remove('collapsed');
  card.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function handleTfFile(e, tfId) {
  const file = e.target.files[0];
  if (!file) return;
  tfData[tfId].mime = file.type || 'image/jpeg';
  const reader = new FileReader();
  reader.onload = (ev) => {
    tfData[tfId].image = ev.target.result.split(',')[1];
    document.getElementById(`previewImg-${tfId}`).src = ev.target.result;
    document.getElementById(`preview-${tfId}`).classList.add('show');
    document.getElementById(`upload-${tfId}`).style.display = 'none';
    document.getElementById(`analyzeBtn-${tfId}`).disabled = false;
    document.getElementById(`status-${tfId}`).textContent = 'Kép feltöltve – kész az elemzésre';
    tfData[tfId].skipped = false;
    buildFlow();
  };
  reader.readAsDataURL(file);
}

function clearTfImage(tfId) {
  tfData[tfId].image = null;
  tfData[tfId].result = null;
  document.getElementById(`preview-${tfId}`).classList.remove('show');
  document.getElementById(`upload-${tfId}`).style.display = 'block';
  document.getElementById(`analyzeBtn-${tfId}`).disabled = true;
  document.getElementById(`result-${tfId}`).classList.remove('show');
  document.getElementById(`result-${tfId}`).innerHTML = '';
  document.getElementById(`status-${tfId}`).textContent = 'Várakozás képre...';
  const vb = document.getElementById(`vbadge-${tfId}`);
  vb.className = 'tf-verdict-badge'; vb.textContent = '';
  buildFlow();
  checkSummarizeBtn();
}

function skipTf(tfId) {
  tfData[tfId].skipped = true;
  tfData[tfId].result = { verdict: 'KIHAGYVA', bias: 'N/A', summary: 'Ezen a timeframe-en nincs releváns szint.' };
  document.getElementById(`status-${tfId}`).textContent = 'Kihagyva';
  const vb = document.getElementById(`vbadge-${tfId}`);
  vb.className = 'tf-verdict-badge skip'; vb.textContent = 'SKIP';
  // collapse and open next
  document.getElementById(`card-${tfId}`).classList.add('collapsed');
  const idx = TIMEFRAMES.findIndex(t => t.id === tfId);
  if (idx < TIMEFRAMES.length - 1) {
    const nextId = TIMEFRAMES[idx + 1].id;
    document.getElementById(`card-${nextId}`).classList.remove('collapsed');
    document.getElementById(`card-${nextId}`).scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
  buildFlow();
  checkSummarizeBtn();
}

async function analyzeTf(tfId) {
  const d = tfData[tfId];
  if (!d.image) return;

  const tf = TIMEFRAMES.find(t => t.id === tfId);
  const session = document.getElementById('sessionSelect').value;
  const price = document.getElementById('priceInput').value;

  document.getElementById(`analyzeBtn-${tfId}`).disabled = true;
  document.getElementById(`loading-${tfId}`).classList.add('show');
  document.getElementById(`result-${tfId}`).classList.remove('show');
  document.getElementById(`status-${tfId}`).textContent = 'Elemzés folyamatban...';

  const loadingMsgs = ['Liquidity keresése...', 'FVG azonosítás...', 'IFVG ellenőrzés...', 'Bias meghatározás...'];
  let li = 0;
  const lint = setInterval(() => {
    document.getElementById(`loadingText-${tfId}`).textContent = loadingMsgs[li % loadingMsgs.length];
    li++;
  }, 600);

  // Build context from higher TF results
  const idx = TIMEFRAMES.findIndex(t => t.id === tfId);
  let higherContext = '';
  for (let i = 0; i < idx; i++) {
    const htf = TIMEFRAMES[i];
    const hd = tfData[htf.id];
    if (hd.result && !hd.skipped) {
      higherContext += `\n- ${htf.id}: ${hd.result.verdict} | Bias: ${hd.result.bias} | ${hd.result.summary}`;
    }
  }

  const systemPrompt = `Te egy profi BTC kereskedési elemző vagy, az R28 Trades Playbook módszerével dolgozol.

R28 ALAPELVEK:
- LIQUIDITY: Swing H/L, Equal H/L, News szintek. Sweep = kiszúrta és visszafordult. Buyside = ár felett, Sellside = ár alatt.
- FVG: 3 gyertyás szerkezet, 1. és 3. gyertya wickje nem találkozik. Egyensúlyhiány.
- IFVG: Gyertya az FVG-n KÍVÜL zár = érvényteleníti, fordulási jel. Ez a belépési jel.
- BELÉPŐ: Liquidity sweep/FVG reakció + IFVG = A+ setup
- TOP-DOWN: Magasabb TF adja a biast, alacsonyabb TF adja a precíz belépőt

VÁLASZOLJ CSAK VALID JSON-BAN:
{
  "verdict": "LONG" | "SHORT" | "VÁRJ" | "SEMLEGES",
  "bias": "BULLISH" | "BEARISH" | "NEUTRAL",
  "confidence": 0-100,
  "summary": "1-2 mondat magyarul",
  "liquidity": "Liquidity elemzés magyarul",
  "fvg_ifvg": "FVG/IFVG elemzés magyarul",
  "key_levels": "Kulcs szintek azonosítva",
  "confirmations": ["megerősítések listája"],
  "warnings": ["figyelmeztetések listája"]
}`;

  const userText = `Elemezd ezt a BTC ${tfId} chart képet R28 módszerrel!\n\nKontextus:\n- Session: ${session || 'ismeretlen'}\n- BTC ár: ${price || 'ismeretlen'}\n- Magasabb TF elemzések:${higherContext || ' nincs még'}\n\nFókusz: ${tf.role}\n\nJSON választ adj!`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{
          role: "user",
          content: [
            { type: "image", source: { type: "base64", media_type: d.mime, data: d.image } },
            { type: "text", text: userText }
          ]
        }]
      })
    });

    clearInterval(lint);

    const raw = await response.json();
    const text = raw.content.filter(b => b.type === 'text').map(b => b.text).join('');
    const match = text.match(/\{[\s\S]*\}/);
    const result = JSON.parse(match ? match[0] : text);
    tfData[tfId].result = result;
    tfData[tfId].skipped = false;

    renderTfResult(tfId, result);

    // auto-open next
    if (idx < TIMEFRAMES.length - 1) {
      setTimeout(() => {
        document.getElementById(`card-${tfId}`).classList.add('collapsed');
        const nextId = TIMEFRAMES[idx + 1].id;
        const nextCard = document.getElementById(`card-${nextId}`);
        nextCard.classList.remove('collapsed');
        nextCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 800);
    }

  } catch (err) {
    clearInterval(lint);
    tfData[tfId].result = { verdict: 'HIBA', bias: 'N/A', summary: err.message };
    document.getElementById(`status-${tfId}`).textContent = 'Hiba – próbáld újra';
  }

  document.getElementById(`loading-${tfId}`).classList.remove('show');
  document.getElementById(`analyzeBtn-${tfId}`).disabled = false;
  buildFlow();
  checkSummarizeBtn();
}

function renderTfResult(tfId, r) {
  const vClass = r.verdict === 'LONG' ? 'bull' : r.verdict === 'SHORT' ? 'bear' : 'wait';
  const vEmoji = r.verdict === 'LONG' ? '🟢' : r.verdict === 'SHORT' ? '🔴' : r.verdict === 'VÁRJ' ? '⏳' : '🔵';

  const confColor = r.confidence >= 65 ? 'var(--green)' : r.confidence >= 40 ? 'var(--orange)' : 'var(--red)';

  const confirmHtml = (r.confirmations || []).map(c => `<span class="tf-tag g">${c}</span>`).join('');
  const warnHtml = (r.warnings || []).map(w => `<span class="tf-tag r">${w}</span>`).join('');

  const html = `
    <div class="tf-res-verdict ${vClass}">
      <div class="tf-res-title">${vEmoji} ${r.verdict}</div>
      <div class="tf-res-body">
        <strong>Bias:</strong> ${r.bias || 'N/A'} &nbsp;|&nbsp; <strong>Megbízhatóság:</strong> ${r.confidence || 0}%<br><br>
        ${r.summary || ''}
      </div>
      <div class="score-wrap">
        <div class="score-track"><div class="score-fill" id="sf-${tfId}" style="background:${confColor}"></div></div>
      </div>
    </div>
    ${r.liquidity ? `<div style="margin-bottom:10px"><div style="font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:5px">Liquidity</div><div class="tf-res-body">${r.liquidity}</div></div>` : ''}
    ${r.fvg_ifvg ? `<div style="margin-bottom:10px"><div style="font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:5px">FVG / IFVG</div><div class="tf-res-body">${r.fvg_ifvg}</div></div>` : ''}
    ${r.key_levels ? `<div style="margin-bottom:10px"><div style="font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:5px">Kulcs szintek</div><div class="tf-res-body">${r.key_levels}</div></div>` : ''}
    ${confirmHtml || warnHtml ? `<div class="tf-tags">${confirmHtml}${warnHtml}</div>` : ''}
  `;

  const el = document.getElementById(`result-${tfId}`);
  el.innerHTML = html;
  el.classList.add('show');

  setTimeout(() => {
    const sf = document.getElementById(`sf-${tfId}`);
    if (sf) sf.style.width = (r.confidence || 0) + '%';
  }, 100);

  // Update header
  const vb = document.getElementById(`vbadge-${tfId}`);
  vb.className = `tf-verdict-badge ${vClass}`;
  vb.textContent = r.verdict;
  document.getElementById(`status-${tfId}`).textContent = `${r.bias || 'N/A'} · ${r.confidence || 0}% konfidencia`;
}

function checkSummarizeBtn() {
  const anyDone = TIMEFRAMES.some(tf => tfData[tf.id].result || tfData[tf.id].skipped);
  const btn = document.getElementById('summarizeBtn');
  btn.classList.toggle('show', anyDone);
}

async function runSummary() {
  document.getElementById('summarizeBtn').disabled = true;
  document.getElementById('summaryLoading').classList.add('show');
  document.getElementById('summarySection').classList.remove('show');

  const steps = ['Timeframe-ek kiértékelése...', 'Confluence keresése...', 'Bias összesítés...', 'Döntés generálása...'];
  let si = 0;
  const sint = setInterval(() => {
    document.getElementById('summaryStep').textContent = steps[si % steps.length];
    si++;
  }, 700);

  const session = document.getElementById('sessionSelect').value;
  const price = document.getElementById('priceInput').value;

  // Build TF summary for prompt
  let tfSummary = '';
  TIMEFRAMES.forEach(tf => {
    const d = tfData[tf.id];
    if (d.skipped) {
      tfSummary += `\n${tf.id} (${tf.role}): KIHAGYVA`;
    } else if (d.result) {
      tfSummary += `\n${tf.id} (${tf.role}): Verdict=${d.result.verdict}, Bias=${d.result.bias}, Konfidencia=${d.result.confidence}%, Összefoglaló="${d.result.summary}"`;
    } else {
      tfSummary += `\n${tf.id}: NEM ELEMZETT`;
    }
  });

  const systemPrompt = `Te egy senior BTC kereskedési döntéshozó vagy, az R28 Trades Playbook módszerével.

Az R28 top-down elemzés szabályai:
- 4H/2H = fő bias meghatározása
- 1H/30M = kulcs szintek, FVG zónák
- 15M/5M = belépő előkészítés, IFVG vadászat  
- 3M = precíz belépő
- Ha a magasabb TF bullish és az alacsonyabb IFVG long belépőt jelez → LONG
- Ha ellentmondás van a TF-ek között → VÁRJ
- Ha nincs IFVG az alacsony TF-en → VÁRJ

VÁLASZOLJ CSAK VALID JSON-BAN:
{
  "final_verdict": "LONG" | "SHORT" | "VÁRJ" | "NEM LÉPJ BE",
  "setup_grade": "A+" | "A" | "B+" | "B" | "B-" | "C" | "D" | "F",
  "overall_bias": "BULLISH" | "BEARISH" | "MIXED" | "NEUTRAL",
  "confidence": 0-100,
  "rr_estimate": "1:1" | "1:2" | "1:3+" | "< 1:1" | "N/A",
  "summary": "3-4 mondatos összefoglaló magyarul",
  "tf_alignment": "TF-ek összhangja magyarázva",
  "entry_plan": "Konkrét belépési terv: mikor, hol, milyen feltétel kell még",
  "sl_guidance": "Stop loss elhelyezési logika",
  "tp_guidance": "Take profit célok",
  "checklist": {
    "higher_tf_bias_clear": true | false,
    "liquidity_swept": true | false,
    "fvg_identified": true | false,
    "ifvg_on_entry_tf": true | false,
    "tf_alignment_good": true | false,
    "rr_acceptable": true | false
  },
  "next_steps": "Konkrét következő teendők"
}`;

  const userText = `Top-down multi-timeframe BTC elemzés összesítése:\n\nSession: ${session || 'ismeretlen'}\nBTC ár: ${price || 'ismeretlen'}\n\nTimeframe elemzések:${tfSummary}\n\nAdj összesített döntést JSON formátumban!`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1200,
        system: systemPrompt,
        messages: [{ role: "user", content: userText }]
      })
    });

    clearInterval(sint);
    const raw = await response.json();
    const text = raw.content.filter(b => b.type === 'text').map(b => b.text).join('');
    const match = text.match(/\{[\s\S]*\}/);
    const result = JSON.parse(match ? match[0] : text);

    document.getElementById('summaryLoading').classList.remove('show');
    renderSummary(result);

  } catch (err) {
    clearInterval(sint);
    document.getElementById('summaryLoading').classList.remove('show');
    document.getElementById('summarizeBtn').disabled = false;
    alert('Hiba az összesítésnél: ' + err.message);
  }
}

function renderSummary(r) {
  const vClass = r.final_verdict === 'LONG' ? 'long' : r.final_verdict === 'SHORT' ? 'short' : r.final_verdict === 'NEM LÉPJ BE' ? 'noentry' : 'wait';
  const vEmoji = r.final_verdict === 'LONG' ? '🟢' : r.final_verdict === 'SHORT' ? '🔴' : r.final_verdict === 'VÁRJ' ? '⏳' : '🚫';
  const confColor = r.confidence >= 65 ? '#00e676' : r.confidence >= 40 ? '#f7931a' : '#ff3b3b';

  const chk = r.checklist || {};
  const ck = v => v ? '✅' : '❌';

  const mtfRows = TIMEFRAMES.map(tf => {
    const d = tfData[tf.id];
    if (!d.result && !d.skipped) return '';
    const res = d.result || {};
    const sigClass = res.verdict === 'LONG' ? 'bull' : res.verdict === 'SHORT' ? 'bear' : res.verdict === 'VÁRJ' ? 'wait' : 'skip';
    return `<div class="mtf-row">
      <span class="mtf-tf">${tf.id}</span>
      <span class="mtf-sig ${sigClass}">${d.skipped ? 'SKIP' : (res.verdict || 'N/A')}</span>
      <span class="mtf-note">${d.skipped ? 'Kihagyva' : (res.summary || '')}</span>
    </div>`;
  }).join('');

  const html = `
    <div class="summary-card">
      <div class="summary-header">
        <h2>📊 TOP-DOWN ÖSSZESÍTETT ELEMZÉS</h2>
        <div style="font-size:10px;color:var(--muted)">${new Date().toLocaleString('hu-HU')} · R28 MTF Módszer</div>
      </div>

      <div class="final-verdict-box">
        <div class="fv-eyebrow">Végső döntés · ${r.setup_grade || 'N/A'} Setup</div>
        <div class="fv-title ${vClass}">${vEmoji} ${r.final_verdict}</div>
        <div class="fv-sub">${r.summary || ''}</div>
        <div class="fv-meta">
          <span>BIAS: <strong>${r.overall_bias || 'N/A'}</strong></span>
          <span>R:R: <strong>${r.rr_estimate || 'N/A'}</strong></span>
          <span>KONFIDENCIA: <strong>${r.confidence || 0}%</strong></span>
        </div>
        <div class="score-wrap" style="margin-top:14px">
          <div class="score-labels"><span>Összesített konfidencia</span><span id="summScoreVal">0%</span></div>
          <div class="score-track"><div class="score-fill" id="summScoreFill" style="background:${confColor}"></div></div>
        </div>
      </div>

      <div class="mtf-grid">
        <h3>Timeframe összefoglaló</h3>
        <div class="mtf-table">${mtfRows}</div>
      </div>

      ${r.tf_alignment || r.entry_plan ? `
      <div style="padding:20px 24px;border-bottom:1px solid var(--border)">
        ${r.tf_alignment ? `<div style="margin-bottom:14px"><div style="font-size:9px;letter-spacing:2px;color:var(--cyan);text-transform:uppercase;margin-bottom:8px">TF Összhang</div><div style="font-size:11px;color:#8a9ab8;line-height:1.8">${r.tf_alignment}</div></div>` : ''}
        ${r.entry_plan ? `<div style="margin-bottom:14px"><div style="font-size:9px;letter-spacing:2px;color:var(--cyan);text-transform:uppercase;margin-bottom:8px">Belépési terv</div><div style="font-size:11px;color:#8a9ab8;line-height:1.8">${r.entry_plan}</div></div>` : ''}
        ${r.sl_guidance ? `<div style="margin-bottom:14px"><div style="font-size:9px;letter-spacing:2px;color:var(--red);text-transform:uppercase;margin-bottom:8px">Stop Loss logika</div><div style="font-size:11px;color:#8a9ab8;line-height:1.8">${r.sl_guidance}</div></div>` : ''}
        ${r.tp_guidance ? `<div><div style="font-size:9px;letter-spacing:2px;color:var(--green);text-transform:uppercase;margin-bottom:8px">Take Profit célok</div><div style="font-size:11px;color:#8a9ab8;line-height:1.8">${r.tp_guidance}</div></div>` : ''}
      </div>
      ` : ''}

      <div class="chk-section">
        <h3>☑️ R28 Checklist</h3>
        <div class="chk-list">
          <div class="chk-item"><span class="ic">${ck(chk.higher_tf_bias_clear)}</span><span>Magasabb TF bias egyértelmű (4H/2H/1H)</span></div>
          <div class="chk-item"><span class="ic">${ck(chk.liquidity_swept)}</span><span>Liquidity sweep megtörtént valamelyik TF-en</span></div>
          <div class="chk-item"><span class="ic">${ck(chk.fvg_identified)}</span><span>FVG azonosítva a releváns TF-eken</span></div>
          <div class="chk-item"><span class="ic">${ck(chk.ifvg_on_entry_tf)}</span><span>IFVG kialakult a belépő TF-en (5M/3M)</span></div>
          <div class="chk-item"><span class="ic">${ck(chk.tf_alignment_good)}</span><span>TF-ek összhangban mutatnak egy irányba</span></div>
          <div class="chk-item"><span class="ic">${ck(chk.rr_acceptable)}</span><span>R:R arány elfogadható (min. 1:1)</span></div>
        </div>
      </div>

      ${r.next_steps ? `
      <div class="next-section">
        <h3>🚀 Következő lépések</h3>
        <div class="next-text">${r.next_steps}</div>
      </div>
      ` : ''}
    </div>

    <button class="btn-reset" onclick="resetAll()">↺ Új elemzés indítása</button>
    <div class="footer-note">R28 Trades Playbook · AI-alapú top-down elemzés · Nem pénzügyi tanácsadás</div>
  `;

  const sec = document.getElementById('summarySection');
  sec.innerHTML = html;
  sec.classList.add('show');
  sec.scrollIntoView({ behavior: 'smooth', block: 'start' });

  setTimeout(() => {
    const sf = document.getElementById('summScoreFill');
    const sv = document.getElementById('summScoreVal');
    if (sf) sf.style.width = (r.confidence || 0) + '%';
    if (sv) sv.textContent = (r.confidence || 0) + '%';
  }, 200);

  document.getElementById('summarizeBtn').disabled = false;
}

function resetAll() {
  TIMEFRAMES.forEach(tf => {
    tfData[tf.id] = { image: null, mime: 'image/jpeg', result: null, skipped: false };
  });
  document.getElementById('summarySection').classList.remove('show');
  document.getElementById('summarySection').innerHTML = '';
  document.getElementById('summarizeBtn').classList.remove('show');
  buildCards();
  buildFlow();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Init
buildFlow();
buildCards();
</script>
</body>
</html>
